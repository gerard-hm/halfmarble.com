<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found | halfmarble</title>
<meta name="robots" content="noindex">
<script>
  // Every path on this site is lowercase, but the products are CamelCase, so people
  // type /ViroFlick and /UnSteadyRing. GitHub Pages is case-sensitive and 404s those.
  // Retry the lowercased path once before showing this page.
  (function () {
    var p = location.pathname;
    var lower = p.toLowerCase();
    if (lower !== p) {
      location.replace(lower + location.search + location.hash);
    }
  })();
</script>
